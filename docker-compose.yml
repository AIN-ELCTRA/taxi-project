version: "3.9"

services:
  db:
    image: postgres:16
    container_name: taxi_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  dashboard:
    build: .
    container_name: taxi_dashboard
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - .:/app

volumes:
  postgres_data: